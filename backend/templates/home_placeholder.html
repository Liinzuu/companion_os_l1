{% extends "base.html" %}

{% block title %}Home — Companion OS{% endblock %}

{% block content %}
<div class="min-vh-100 d-flex align-items-center justify-content-center px-3">
    <div class="card w-100" style="max-width: 400px; box-shadow: 0 2px 16px rgba(44,36,22,0.07);">
        <div class="card-body p-4 text-center">

            <h1 class="h4 fw-semibold mb-2">You're in.</h1>
            <p class="mb-4" style="color: var(--color-text-muted);">
                Signed in as <strong>{{ user.username }}</strong>.<br>
                The chat interface is coming soon.
            </p>

            <!--
                Logout uses a POST form, not a link.
                Why POST and not a simple <a href="/accounts/logout/">?
                Because logout must change server state (destroy the session).
                GET requests should never change state — that's a security rule.
                A link is a GET. A form submit is a POST.
                Django's LogoutView enforces this.
            -->
            <form method="post" action="{% url 'accounts:logout' %}">
                {% csrf_token %}
                <button type="submit" class="btn btn-primary-warm">Sign out</button>
            </form>

        </div>
    </div>
</div>
{% endblock %}
