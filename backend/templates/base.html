<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Companion OS{% endblock %}</title>

    <!-- Google Fonts — loaded before Bootstrap so they're available immediately -->
    <!-- Atkinson Hyperlegible: body text — designed for readability and different brains -->
    <!-- Inter: headings — clean, modern, not cold -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /*
         * CSS custom properties = the single source of truth for all colors.
         * Every component reads from these variables.
         * When we add ambient time-of-day shifts later, we only update these variables —
         * every component updates automatically. No hunting through stylesheets.
         */
        :root {
            --color-bg:         #EDE8DF;  /* deeper warm — background sits back, not in your face */
            --color-surface:    #F7F3ED;  /* card surface — close to background, no harsh jump */
            --color-text:       #3A3028;  /* warm dark — readable but not harsh */
            --color-text-muted: #9A8E80;  /* muted — hints, labels, secondary */
            --color-accent:     #8B6F4E;  /* warm brown — buttons, links, focus */
            --color-border:     #DDD6C8;  /* border — barely visible, just enough */

            --font-body:    'Atkinson Hyperlegible', sans-serif;
            --font-heading: 'Inter', sans-serif;

            --text-base:    1rem;        /* 16px minimum — never smaller for body */
            --line-height:  1.6;         /* breathing room between lines */
            --radius:       12px;        /* rounded but not bubbly */
        }

        /* Override Bootstrap's defaults with our palette */
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: var(--text-base);
            line-height: var(--line-height);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            color: var(--color-text);
        }

        /* Cards */
        .card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
        }

        /* Form inputs */
        .form-control {
            background-color: var(--color-surface);
            border-color: var(--color-border);
            color: var(--color-text);
            border-radius: 8px;
            padding: 0.625rem 0.875rem;
            font-family: var(--font-body);
            font-size: var(--text-base);
        }

        .form-control:focus {
            background-color: var(--color-surface);
            border-color: var(--color-accent);
            color: var(--color-text);
            box-shadow: 0 0 0 3px rgba(139, 111, 78, 0.15);
        }

        .form-control.is-invalid {
            border-color: #c0392b;
        }

        .form-text {
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }

        /* Primary button */
        .btn-primary-warm {
            background-color: var(--color-accent);
            border-color: var(--color-accent);
            color: #FDFAF5;
            font-family: var(--font-heading);
            font-weight: 500;
            border-radius: 8px;
            padding: 0.625rem 1.25rem;
            font-size: var(--text-base);
            transition: background-color 0.15s ease;
        }

        .btn-primary-warm:hover,
        .btn-primary-warm:focus {
            background-color: #7a6044;
            border-color: #7a6044;
            color: #FDFAF5;
        }

        /* Links */
        a {
            color: var(--color-accent);
            text-decoration: none;
        }

        a:hover {
            color: #7a6044;
            text-decoration: underline;
        }

        /* Muted text */
        .text-muted {
            color: var(--color-text-muted) !important;
        }

        hr {
            border-color: var(--color-border);
            opacity: 1;
        }

        /* Crisis banner — always visible, never dismissible */
        .crisis-banner {
            background-color: var(--color-surface);
            border-bottom: 1px solid var(--color-border);
            padding: 0.4rem 1rem;
            text-align: center;
            font-size: 0.75rem;
            color: var(--color-text-muted);
            line-height: 1.5;
            font-family: var(--font-body);
        }

        .crisis-banner a {
            color: var(--color-text);
            font-weight: 600;
            text-decoration: underline;
        }

        .crisis-banner a:hover {
            color: var(--color-accent);
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Crisis banner — permanent, non-dismissible, always visible on every page.
         This is not a feature. It is a safety requirement.
         The AI is not a therapist. Users must always see a path to real help. -->
    <div class="crisis-banner" role="complementary" aria-label="Crisis support information">
        This is an AI support tool. Not a therapist. Not a substitute for professional help.
        In crisis, contact:
        <a href="tel:112">112</a> (EU) &middot;
        <a href="tel:988">988</a> (US) &middot;
        <a href="https://findahelpline.com" target="_blank" rel="noopener">Find your helpline</a>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
