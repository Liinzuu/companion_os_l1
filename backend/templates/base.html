<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Companion OS{% endblock %}</title>

    <!-- Google Fonts — loaded before Bootstrap so they're available immediately -->
    <!-- Cormorant Garamond: headings — warm, editorial, human -->
    <!-- Jost: body — clean and readable without feeling clinical -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /*
         * CSS custom properties = the single source of truth for all colors.
         * Every component reads from these variables.
         * When we add ambient time-of-day shifts later, we only update these variables —
         * every component updates automatically. No hunting through stylesheets.
         */
        :root {
            --color-bg:         #EDE8DF;  /* darker warm grey — outer page */
            --color-surface:    #FAF7F2;  /* lighter parchment — cards sit on top */
            --color-text:       #1A1A1A;  /* near-black — readable without harshness */
            --color-text-muted: #4A4540;  /* secondary labels, hints */
            --color-accent:     #C9952A;  /* warm premium gold */
            --color-accent-dim: #B8860B;  /* darker hover state */
            --color-accent-light: #CFB44A; /* richer highlight */
            --color-border:     #E8E4DC;  /* borders, dividers */

            --font-body:    'Jost', sans-serif;
            --font-heading: 'Cormorant Garamond', serif;

            --text-base:    1rem;        /* 16px minimum — never smaller for body */
            --line-height:  1.6;         /* breathing room between lines */
            --radius:       12px;        /* rounded but not bubbly */
        }

        /* Override Bootstrap's defaults with our palette */
        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            font-family: var(--font-body);
            font-size: var(--text-base);
            line-height: var(--line-height);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            color: var(--color-text);
        }

        /* Cards */
        .card {
            background-color: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
        }

        /* Form inputs */
        .form-control {
            background-color: #FDFAF6;
            border: 1px solid #C8C0B0;
            color: var(--color-text);
            border-radius: 8px;
            padding: 0.625rem 0.875rem;
            font-family: var(--font-body);
            font-size: var(--text-base);
        }

        .form-control:focus {
            background-color: #FDFAF6;
            border-color: var(--color-accent);
            color: var(--color-text);
            box-shadow: 0 0 0 3px rgba(184, 134, 11, 0.18);
        }

        .form-control.is-invalid {
            border-color: #c0392b;
        }

        .form-text {
            color: var(--color-text-muted);
            font-size: 0.8rem;
        }

        /* Primary button */
        .btn-primary-warm {
            background-color: var(--color-accent);
            border-color: var(--color-accent);
            color: #1A1A1A;
            font-family: var(--font-body);
            font-weight: 500;
            letter-spacing: 0.08em;
            border-radius: 8px;
            padding: 0.625rem 1.25rem;
            font-size: var(--text-base);
            box-shadow: 0 2px 8px rgba(184, 134, 11, 0.3);
            transition: background-color 0.15s ease, box-shadow 0.15s ease;
        }

        .btn-primary-warm:hover,
        .btn-primary-warm:focus {
            background-color: #D4A820;
            border-color: #D4A820;
            color: #1A1A1A;
            transition: background-color 0.2s ease;
        }

        /* Links */
        a {
            color: var(--color-accent-dim);
            text-decoration: none;
        }

        a:hover {
            color: var(--color-accent);
            text-decoration: underline;
        }

        /* Muted text */
        .text-muted {
            color: var(--color-text-muted) !important;
        }

        hr {
            border-color: var(--color-border);
            opacity: 1;
        }

        /* Crisis banner — always visible, never dismissible */
        /* Full-page flex layout so the crisis banner + main content
           always fit within the viewport. No page-level scrollbar. */
        .page-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
        }

        .page-wrapper > main {
            flex: 1;
            min-height: 0; /* allow main to shrink below content size */
        }

        .crisis-banner {
            flex-shrink: 0;
            align-self: center;
            width: calc(100% - 2rem);
            max-width: 560px;
            margin: 16px auto;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(26, 20, 10, 0.08);
            background: #FAF7F2;
            text-align: center;
            font-size: 13px;
            color: #1A1A1A;
            line-height: 1.6;
            font-family: var(--font-body);
        }

        /* On phone: stack the text and links on separate lines */
        @media (max-width: 480px) {
            .crisis-links {
                display: block;
                margin-top: 0.25rem;
            }
        }

        .crisis-banner a {
            color: #c0392b;
            font-weight: 600;
            text-decoration: underline;
        }

        .crisis-banner a:hover {
            color: #a93226;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        /* Override browser autofill yellow — Chrome/Safari inject their own background */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px #FDFAF6 inset;
            box-shadow: 0 0 0px 1000px #FDFAF6 inset;
            -webkit-text-fill-color: #1A1A1A;
        }
    </style>

    {% block extra_css %}{% endblock %}
</head>
<body>
<div class="page-wrapper">

    <!-- Crisis banner — permanent, non-dismissible, always visible on every page.
         This is not a feature. It is a safety requirement.
         The AI is not a therapist. Users must always see a path to real help. -->
    <div class="crisis-banner" role="complementary" aria-label="Crisis support information">
        This is an AI, not a therapist. Not a substitute for professional help.
        <span class="crisis-links">In crisis, contact:
        <a href="tel:112">112</a> (EU) &middot;
        <a href="tel:988">988</a> (US) &middot;
        <a href="https://findahelpline.com" target="_blank" rel="noopener">Find your helpline</a></span>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>

</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
