[build]
dockerfilePath = "Dockerfile"

[deploy]
# No healthcheckPath — Railway uses TCP port check instead.
# HTTP healthcheck fails because Django ALLOWED_HOSTS rejects Railway's internal IP.
startCommand = "python manage.py migrate --noinput && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --timeout 120 --workers 1"
